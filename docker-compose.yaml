# nginx proxy address - http://172.17.0.1:59085

name: mssql
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  admin:
    image: adminer:latest
    container_name: mssql-admin
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: mssql-admin
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      ADMINER_DESIGN: dracula
      ADMINER_DEFAULT_DB_DRIVER: mssql
      ADMINER_DEFAULT_DB_HOST: mssql-server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 172.17.0.1:59085:8080
    extra_hosts:
      - 'localhost:172.17.0.1'
      - 'mssqldb:host-gateway'
      - 'mssql-server:host-gateway'
      - 'host.docker.internal:host-gateway'
    networks:
      - mssql
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://mssql-admin:8080'
      - 'cloudflare.hostname=mssql.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.mssql-admin.entrypoints=http'
      - 'traefik.http.routers.mssql-admin-secure.tls=true'
      - 'traefik.http.routers.mssql-admin.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.mssql-admin-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.mssql-admin.middlewares=mssql-admin-https-redirect'
      - 'traefik.http.routers.mssql-admin-secure.entrypoints=https'
      - 'traefik.http.routers.mssql-admin-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.mssql-admin-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.mssql-admin-secure.service=mssql-admin'
      - 'traefik.http.services.mssql-admin.loadbalancer.server.port=8080'

  db:
    image: mcr.microsoft.com/mssql/server:latest
    container_name: mssql-server
    hostname: mssql-server
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: mssql-server
      ACCEPT_EULA: Y
      MSSQL_PID: ${MSSQL_PRODUCT_ID:-Developer}
      SA_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    ports:
      - '1433:1433'
    volumes:
      - './volumes/data/db/mssql:/var/opt/sqlserver'
      - './volumes/config/mssql/initdb:/usr/src/app/docker-entrypoint-initdb.d'
    healthcheck:
      test: bash -c 'pidof -q sqlservr;exit $?'
      start_period: 10s
      interval: 10s
      timeout: 3s
      retries: 10
    extra_hosts:
      - 'localhost:172.17.0.1'
      - 'mssqldb:host-gateway'
      - 'mssql-server:host-gateway'
      - 'host.docker.internal:host-gateway'
    networks:
      - mssql

networks:
  mssql:
    name: mssql
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
